<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cozy Pomodoro</title>
<style>
  :root {
    --bg: #f4ece1;
    --bg-soft: #efe4d4;
    --card: #fbf6ee;
    --ink: #5a4a3a;
    --ink-soft: #8a7665;
    --accent: #d98e63;
    --accent-deep: #c0764c;
    --green-0: #ede3d3;
    --green-1: #e0c9a6;
    --green-2: #cba577;
    --green-3: #a87a4a;
    --green-4: #7a5230;
    --line: #e6dac9;
    --shadow: rgba(120, 95, 70, 0.18);
    --tb-h: 38px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, #f8f1e7 0%, var(--bg) 60%);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: calc(var(--tb-h) + 16px) 16px 40px;
    overflow-y: auto;
    overflow-x: hidden;
  }

  /* ---- frameless titlebar ---- */
  .titlebar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--tb-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 6px 0 14px;
    background: rgba(244, 236, 225, 0.85);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    z-index: 100;
    -webkit-app-region: drag;
    user-select: none;
  }
  .titlebar .tb-title {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--ink-soft);
    letter-spacing: 0.3px;
  }
  .titlebar .tb-controls { display: flex; gap: 2px; -webkit-app-region: no-drag; }
  .titlebar .tb-controls button {
    width: 30px; height: 28px;
    border: none; background: transparent;
    border-radius: 7px; cursor: pointer;
    font-size: 13px; color: var(--ink-soft);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
    font-family: inherit;
  }
  .titlebar .tb-controls button:hover { background: var(--bg-soft); color: var(--ink); }
  .titlebar .tb-controls #closeBtn:hover { background: #e0a08a; color: #fff; }
  .titlebar .tb-controls #pinBtn.active { color: var(--accent-deep); background: var(--bg-soft); }

  .app { width: 100%; max-width: 460px; }

  header { text-align: center; margin-bottom: 16px; }
  header h1 {
    font-size: 21px; letter-spacing: 0.5px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  header p { font-size: 13px; color: var(--ink-soft); margin-top: 4px; }

  /* ---- tab toggle ---- */
  .tabs {
    display: flex; background: var(--bg-soft);
    border-radius: 14px; padding: 5px; gap: 4px;
    margin-bottom: 20px; box-shadow: inset 0 1px 3px var(--shadow);
  }
  .tabs button {
    flex: 1; border: none; background: transparent;
    padding: 10px 8px; border-radius: 10px;
    font-size: 14px; font-weight: 600; color: var(--ink-soft);
    cursor: pointer; transition: all 0.2s ease; font-family: inherit;
  }
  .tabs button.active {
    background: var(--card); color: var(--accent-deep);
    box-shadow: 0 2px 6px var(--shadow);
  }

  .screen { display: none; animation: fade 0.35s ease; }
  .screen.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .card {
    background: var(--card); border-radius: 20px; padding: 22px;
    box-shadow: 0 6px 20px var(--shadow); border: 1px solid var(--line);
  }

  /* ---- pomodoro ---- */
  .scene {
    background: linear-gradient(160deg, #fbf3e7 0%, #f3e6d2 100%);
    border-radius: 18px; padding: 10px; margin-bottom: 18px;
    border: 1px solid var(--line); overflow: hidden;
  }
  .scene svg { width: 100%; height: auto; display: block; }

  .timer-display { text-align: center; margin: 6px 0 14px; }
  .timer-display .time {
    font-size: 54px; font-weight: 700; letter-spacing: 2px;
    font-variant-numeric: tabular-nums; color: var(--ink);
  }
  .timer-display .state-label {
    font-size: 13px; color: var(--accent-deep); font-weight: 600;
    text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px;
  }

  .current-task-pill {
    display: none; text-align: center; background: var(--bg-soft);
    border-radius: 12px; padding: 10px 14px; margin-bottom: 16px;
    font-size: 15px; font-weight: 600; color: var(--ink);
  }
  .current-task-pill span { color: var(--ink-soft); font-weight: 500; font-size: 12px; display:block; margin-bottom:2px;}

  /* duration slider */
  .duration-box { margin-bottom: 18px; }
  .duration-box .row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .duration-box .row label { font-size: 13px; color: var(--ink-soft); font-weight: 600; }
  .duration-box .row .val { font-size: 18px; font-weight: 700; color: var(--accent-deep); }
  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 8px; border-radius: 6px;
    background: var(--bg-soft); outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
    border: 3px solid var(--card); box-shadow: 0 2px 5px var(--shadow);
  }

  /* tasks */
  .task-list { list-style: none; margin-bottom: 18px; }
  .task-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 12px; border-radius: 12px;
    background: var(--bg-soft); margin-bottom: 8px;
    transition: opacity 0.45s ease, transform 0.3s ease;
  }
  .task-item.dimmed { opacity: 0.28; }
  .task-item.removing { opacity: 0; transform: translateX(40px) scale(0.9); }
  .task-item input[type="checkbox"] {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px; min-width: 22px;
    border-radius: 7px; border: 2px solid var(--accent);
    cursor: pointer; position: relative; transition: all 0.2s; background: var(--card);
  }
  .task-item input[type="checkbox"]:checked { background: var(--accent); }
  .task-item input[type="checkbox"]:checked::after {
    content: ""; position: absolute; left: 6px; top: 2px;
    width: 6px; height: 11px; border: solid #fff; border-width: 0 3px 3px 0;
    transform: rotate(45deg);
  }
  .task-item input[type="text"] {
    flex: 1; border: none; background: transparent;
    font-size: 15px; color: var(--ink); font-family: inherit; outline: none;
  }
  .task-item input[type="text"]:focus { color: var(--accent-deep); }

  .btn-row { display: flex; gap: 10px; }
  button.action {
    flex: 1; border: none; border-radius: 14px; padding: 14px;
    font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
    transition: transform 0.1s, box-shadow 0.2s;
  }
  button.action:active { transform: scale(0.97); }
  .btn-start { background: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(217,142,99,0.4); }
  .btn-pause { background: var(--bg-soft); color: var(--ink); }
  .btn-stop  { background: #efe4d4; color: var(--accent-deep); border: 1px solid var(--line) !important; }
  button.action:disabled { opacity: 0.4; cursor: not-allowed; }

  .session-counter { text-align: center; font-size: 13px; color: var(--ink-soft); margin-top: 14px; }
  .session-counter b { color: var(--accent-deep); }

  /* ---- calendar ---- */
  .cal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .cal-head h2 { font-size: 17px; }
  .cal-nav button {
    border: none; background: var(--bg-soft); width: 32px; height: 32px;
    border-radius: 9px; cursor: pointer; font-size: 16px; color: var(--ink); font-family: inherit;
  }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cal-dow { text-align: center; font-size: 11px; color: var(--ink-soft); font-weight: 600; padding-bottom: 4px; }
  .cal-cell {
    aspect-ratio: 1; border-radius: 9px; background: var(--green-0);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; position: relative; font-size: 12px; color: var(--ink-soft);
    transition: transform 0.15s; border: 1.5px solid transparent;
  }
  .cal-cell:hover { transform: scale(1.08); }
  .cal-cell.empty { background: transparent; cursor: default; }
  .cal-cell.today { border-color: var(--accent); }
  .cal-cell.lvl1 { background: var(--green-1); }
  .cal-cell.lvl2 { background: var(--green-2); }
  .cal-cell.lvl3 { background: var(--green-3); color:#fff;}
  .cal-cell.lvl4 { background: var(--green-4); color:#fff;}
  .cal-cell .dnum { font-weight: 600; }
  .cal-cell .dot { font-size: 9px; opacity: 0.85; }

  .legend { display: flex; align-items: center; gap: 6px; justify-content: flex-end; margin-top: 16px; font-size: 11px; color: var(--ink-soft); }
  .legend .sq { width: 14px; height: 14px; border-radius: 4px; }

  /* ---- detail ---- */
  .detail-date { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .detail-sub { font-size: 13px; color: var(--ink-soft); margin-bottom: 18px; }
  .detail-stats { display: flex; gap: 12px; margin-bottom: 20px; }
  .stat-box { flex: 1; background: var(--bg-soft); border-radius: 14px; padding: 14px; text-align: center; }
  .stat-box .num { font-size: 26px; font-weight: 700; color: var(--accent-deep); }
  .stat-box .lbl { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
  .done-list { list-style: none; }
  .done-list li {
    display: flex; align-items: center; gap: 10px; padding: 12px;
    background: var(--bg-soft); border-radius: 12px; margin-bottom: 8px; font-size: 14px;
  }
  .done-list li .check { color: var(--green-4); font-weight: 700; }
  .empty-note { text-align: center; color: var(--ink-soft); font-size: 14px; padding: 30px 0; }
  .back-btn {
    border: none; background: var(--bg-soft); padding: 9px 14px; border-radius: 10px;
    font-size: 13px; cursor: pointer; color: var(--ink); margin-bottom: 16px; font-family: inherit; font-weight: 600;
  }

  .running-mode .config-zone { display: none; }
  .running-mode .current-task-pill { display: block; }
</style>
</head>
<body>
<!-- frameless titlebar -->
<div class="titlebar">
  <div class="tb-title">🐱 Cozy Pomodoro</div>
  <div class="tb-controls">
    <button id="pinBtn" title="항상 위에 표시">📌</button>
    <button id="minBtn" title="최소화">─</button>
    <button id="closeBtn" title="트레이로 숨기기">✕</button>
  </div>
</div>

<div class="app">
  <header>
    <h1>🐱 Cozy Pomodoro</h1>
    <p>고양이와 함께하는 몰입 시간</p>
  </header>

  <nav class="tabs">
    <button data-screen="pomo" class="active">뽀모도로</button>
    <button data-screen="cal">달력</button>
    <button data-screen="detail">기록</button>
  </nav>

  <!-- ============ POMODORO ============ -->
  <section class="screen active" id="screen-pomo">
    <div class="card" id="pomoCard">
      <div class="scene">
        <svg viewBox="0 0 320 170" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="floor" cx="50%" cy="100%" r="80%">
              <stop offset="0%" stop-color="#f3e3cb"/>
              <stop offset="100%" stop-color="#ecd9bd"/>
            </radialGradient>
          </defs>
          <ellipse cx="160" cy="150" rx="150" ry="22" fill="url(#floor)"/>
          <ellipse cx="160" cy="150" rx="95" ry="14" fill="#e3c79f" opacity="0.6"/>

          <g id="toy">
            <circle cx="0" cy="0" r="13" fill="#d98e63"/>
            <path d="M -13 0 Q 0 -9 13 0 M -11 5 Q 0 -4 11 5 M -11 -5 Q 0 4 11 -5 M 0 -13 Q 9 0 0 13 M -6 -11 Q 4 0 -4 12 M 6 -11 Q -4 0 4 12"
                  stroke="#b96f47" stroke-width="1.3" fill="none" opacity="0.8"/>
          </g>

          <g id="cat">
            <path id="tail" d="M 205 120 Q 250 118 248 95 Q 246 78 232 84"
                  stroke="#9a8576" stroke-width="11" fill="none" stroke-linecap="round"/>
            <ellipse cx="180" cy="120" rx="42" ry="30" fill="#a8917f"/>
            <ellipse cx="180" cy="126" rx="30" ry="20" fill="#c4b1a1"/>
            <g id="paws">
              <rect x="150" y="120" width="11" height="26" rx="5.5" fill="#a8917f"/>
              <rect x="166" y="124" width="11" height="24" rx="5.5" fill="#9a8576"/>
            </g>
            <g id="head">
              <ellipse cx="148" cy="98" rx="26" ry="24" fill="#a8917f"/>
              <path d="M 128 84 L 122 64 L 142 78 Z" fill="#a8917f"/>
              <path d="M 168 84 L 174 64 L 154 78 Z" fill="#a8917f"/>
              <path d="M 129 82 L 126 70 L 138 79 Z" fill="#e0b9a0"/>
              <path d="M 167 82 L 170 70 L 158 79 Z" fill="#e0b9a0"/>
              <ellipse cx="148" cy="102" rx="16" ry="13" fill="#c4b1a1"/>
              <g id="eyes">
                <circle cx="140" cy="96" r="3.2" fill="#4a3b2f"/>
                <circle cx="156" cy="96" r="3.2" fill="#4a3b2f"/>
                <circle cx="141" cy="95" r="1" fill="#fff"/>
                <circle cx="157" cy="95" r="1" fill="#fff"/>
              </g>
              <path d="M 146 103 L 150 103 L 148 106 Z" fill="#d98e63"/>
              <path d="M 148 106 Q 144 109 141 106 M 148 106 Q 152 109 155 106" stroke="#8a7665" stroke-width="1" fill="none"/>
              <path d="M 132 101 L 118 99 M 132 104 L 119 105 M 164 101 L 178 99 M 164 104 L 177 105"
                    stroke="#cdbcab" stroke-width="1" fill="none"/>
            </g>
          </g>

          <text id="zzz" x="205" y="70" font-size="16" fill="#b9a48f" opacity="0" font-family="sans-serif">z</text>
        </svg>
      </div>

      <div class="timer-display">
        <div class="time" id="timeText">30:00</div>
        <div class="state-label" id="stateLabel">준비됨</div>
      </div>

      <div class="current-task-pill" id="currentTaskPill">
        <span>지금 집중하는 일</span>
        <div id="currentTaskText">—</div>
      </div>

      <div class="config-zone">
        <div class="duration-box">
          <div class="row">
            <label>집중 시간</label>
            <span class="val" id="durVal">30분</span>
          </div>
          <input type="range" id="durSlider" min="30" max="120" step="5" value="30" />
        </div>
        <ul class="task-list" id="taskList"></ul>
      </div>

      <div class="btn-row">
        <button class="action btn-start" id="startBtn">집중 시작</button>
        <button class="action btn-pause" id="pauseBtn" style="display:none;">일시정지</button>
        <button class="action btn-stop" id="stopBtn" style="display:none;">정지</button>
      </div>

      <div class="session-counter">오늘 완료한 세션: <b id="todaySessions">0</b>회</div>
    </div>
  </section>

  <!-- ============ CALENDAR ============ -->
  <section class="screen" id="screen-cal">
    <div class="card">
      <div class="cal-head">
        <div class="cal-nav"><button id="prevMonth">‹</button></div>
        <h2 id="calTitle">2026년 6월</h2>
        <div class="cal-nav"><button id="nextMonth">›</button></div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="legend">
        적음
        <div class="sq" style="background:var(--green-0)"></div>
        <div class="sq" style="background:var(--green-1)"></div>
        <div class="sq" style="background:var(--green-2)"></div>
        <div class="sq" style="background:var(--green-3)"></div>
        <div class="sq" style="background:var(--green-4)"></div>
        많음
      </div>
    </div>
  </section>

  <!-- ============ DETAIL ============ -->
  <section class="screen" id="screen-detail">
    <div class="card">
      <button class="back-btn" id="backToCal">‹ 달력으로</button>
      <div class="detail-date" id="detailDate">날짜 선택</div>
      <div class="detail-sub" id="detailSub">달력에서 날짜를 눌러보세요</div>
      <div class="detail-stats">
        <div class="stat-box"><div class="num" id="statTasks">0</div><div class="lbl">완료 태스크</div></div>
        <div class="stat-box"><div class="num" id="statSessions">0</div><div class="lbl">완료 세션</div></div>
      </div>
      <ul class="done-list" id="doneList"></ul>
    </div>
  </section>
</div>

<script>
(function () {
  "use strict";

  /* ---------- window controls (frameless) ---------- */
  var pinBtn = document.getElementById("pinBtn");
  var minBtn = document.getElementById("minBtn");
  var closeBtn = document.getElementById("closeBtn");
  if (window.cozy) {
    window.cozy.isAlwaysOnTop().then(function (v) { pinBtn.classList.toggle("active", !!v); });
    pinBtn.addEventListener("click", function () {
      window.cozy.toggleAlwaysOnTop().then(function (v) { pinBtn.classList.toggle("active", !!v); });
    });
    minBtn.addEventListener("click", function () { window.cozy.minimize(); });
    closeBtn.addEventListener("click", function () { window.cozy.hideToTray(); });
  }

  // ---------- storage ----------
  var STORE_KEY = "cozyPomodoroData_v1";
  var data = load();
  function load() {
    try {
      var d = JSON.parse(localStorage.getItem(STORE_KEY));
      if (d && d.records) return d;
    } catch (e) {}
    return { records: {}, todayTasks: ["", "", "", "", ""], todayKey: null };
  }
  function save() { localStorage.setItem(STORE_KEY, JSON.stringify(data)); }

  function dateKey(d) {
    return d.getFullYear() + "-" +
      String(d.getMonth() + 1).padStart(2, "0") + "-" +
      String(d.getDate()).padStart(2, "0");
  }
  var todayKey = dateKey(new Date());

  if (data.todayKey !== todayKey) {
    data.todayKey = todayKey;
    data.todayTasks = ["", "", "", "", ""];
    save();
  }

  function recordFor(key) {
    if (!data.records[key]) data.records[key] = { tasks: [], sessions: 0 };
    return data.records[key];
  }

  // ---------- elements ----------
  var $ = function (id) { return document.getElementById(id); };
  var taskListEl = $("taskList");
  var durSlider = $("durSlider"), durVal = $("durVal");
  var timeText = $("timeText"), stateLabel = $("stateLabel");
  var startBtn = $("startBtn"), pauseBtn = $("pauseBtn"), stopBtn = $("stopBtn");
  var pomoCard = $("pomoCard");
  var currentTaskText = $("currentTaskText");
  var todaySessionsEl = $("todaySessions");

  // ---------- task list rendering ----------
  function renderTasks() {
    taskListEl.innerHTML = "";
    data.todayTasks.forEach(function (text, i) {
      var li = document.createElement("li");
      li.className = "task-item";
      li.dataset.index = i;

      var cb = document.createElement("input");
      cb.type = "checkbox";

      var tx = document.createElement("input");
      tx.type = "text";
      tx.value = text;
      tx.placeholder = "할 일 " + (i + 1);
      tx.addEventListener("input", function () {
        data.todayTasks[i] = tx.value;
        save();
      });

      cb.addEventListener("change", function () {
        if (cb.checked) completeTask(i, li, tx.value);
      });

      li.appendChild(cb);
      li.appendChild(tx);
      taskListEl.appendChild(li);
    });
    applyDimming();
  }

  function applyDimming() {
    var items = taskListEl.querySelectorAll(".task-item");
    items.forEach(function (li) {
      var idx = Number(li.dataset.index);
      if (running && idx !== activeTaskIndex) li.classList.add("dimmed");
      else li.classList.remove("dimmed");
    });
    items.forEach(function (li) {
      li.querySelector('input[type="text"]').readOnly = running;
    });
  }

  function completeTask(i, li, text) {
    var label = (text || "").trim();
    if (!label) label = "할 일 " + (i + 1);
    var rec = recordFor(todayKey);
    rec.tasks.push(label);
    save();

    li.classList.add("removing");
    setTimeout(function () {
      data.todayTasks[i] = "";
      save();
      renderTasks();
      if (running) {
        activeTaskIndex = firstNonEmptyIndex();
        updateCurrentTaskText();
        applyDimming();
      }
    }, 450);
    refreshCalendar();
  }

  function firstNonEmptyIndex() {
    for (var i = 0; i < data.todayTasks.length; i++) {
      if (data.todayTasks[i].trim()) return i;
    }
    return 0;
  }
  function updateCurrentTaskText() {
    var t = data.todayTasks[activeTaskIndex];
    currentTaskText.textContent = (t && t.trim()) ? t.trim() : "모든 태스크 완료! 🎉";
  }

  // ---------- duration slider ----------
  durSlider.addEventListener("input", function () {
    var m = Number(durSlider.value);
    durVal.textContent = m + "분";
    if (!running) {
      totalSeconds = m * 60;
      remaining = totalSeconds;
      renderTime();
    }
  });

  // ---------- timer engine ----------
  var running = false, paused = false;
  var totalSeconds = 30 * 60;
  var remaining = totalSeconds;
  var endTime = 0;
  var activeTaskIndex = 0;
  var tickInterval = null;

  function renderTime() {
    var s = Math.max(0, Math.round(remaining));
    var mm = String(Math.floor(s / 60)).padStart(2, "0");
    var ss = String(s % 60).padStart(2, "0");
    timeText.textContent = mm + ":" + ss;
  }

  function startTimer() {
    running = true; paused = false;
    activeTaskIndex = firstNonEmptyIndex();
    if (remaining <= 0) remaining = totalSeconds;
    endTime = Date.now() + remaining * 1000;

    pomoCard.classList.add("running-mode");
    startBtn.style.display = "none";
    pauseBtn.style.display = ""; pauseBtn.textContent = "일시정지";
    stopBtn.style.display = "";
    stateLabel.textContent = "집중 중";
    setCatPlaying(true);
    updateCurrentTaskText();
    renderTasks();
    applyDimming();
    runInterval();
  }

  function runInterval() {
    clearInterval(tickInterval);
    tickInterval = setInterval(function () {
      remaining = (endTime - Date.now()) / 1000;
      if (remaining <= 0) {
        remaining = 0; renderTime();
        finishSession();
      } else {
        renderTime();
      }
    }, 250);
  }

  function pauseTimer() {
    if (!running) return;
    if (!paused) {
      paused = true;
      clearInterval(tickInterval);
      remaining = (endTime - Date.now()) / 1000;
      stateLabel.textContent = "일시정지";
      pauseBtn.textContent = "이어서";
      setCatPlaying(false);
    } else {
      paused = false;
      endTime = Date.now() + remaining * 1000;
      stateLabel.textContent = "집중 중";
      pauseBtn.textContent = "일시정지";
      setCatPlaying(true);
      runInterval();
    }
  }

  function stopTimer() {
    clearInterval(tickInterval);
    running = false; paused = false;
    remaining = totalSeconds;
    exitRunningUI("정지됨 (기록 안 됨)");
  }

  function finishSession() {
    clearInterval(tickInterval);
    running = false; paused = false;
    var rec = recordFor(todayKey);
    rec.sessions += 1;
    save();
    playMeow();
    refreshCalendar();
    updateTodaySessions();
    remaining = totalSeconds;
    exitRunningUI("세션 완료! 🐾");
  }

  function exitRunningUI(label) {
    pomoCard.classList.remove("running-mode");
    startBtn.style.display = "";
    pauseBtn.style.display = "none";
    stopBtn.style.display = "none";
    stateLabel.textContent = label;
    setCatPlaying(false);
    renderTime();
    renderTasks();
  }

  function updateTodaySessions() {
    var rec = data.records[todayKey];
    todaySessionsEl.textContent = rec ? rec.sessions : 0;
  }

  startBtn.addEventListener("click", startTimer);
  pauseBtn.addEventListener("click", pauseTimer);
  stopBtn.addEventListener("click", stopTimer);

  // ---------- cat animation ----------
  var toy = $("toy"), tail = $("tail"), paws = $("paws"), head = $("head"), zzz = $("zzz");
  var animPlaying = false, animStart = 0, animFrame = null;
  function setCatPlaying(on) {
    animPlaying = on;
    if (on) {
      zzz.setAttribute("opacity", "0");
      animStart = performance.now();
      if (!animFrame) animFrame = requestAnimationFrame(animLoop);
    } else {
      if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
      toy.setAttribute("transform", "translate(110,135)");
      paws.setAttribute("transform", "translate(0,0)");
      tail.setAttribute("transform", "rotate(0 205 120)");
      head.setAttribute("transform", "rotate(0 148 98)");
      sleepyBlink();
    }
  }
  function animLoop(now) {
    var t = (now - animStart) / 1000;
    var tx = 110 + Math.sin(t * 2.2) * 26;
    var ty = 135 - Math.abs(Math.sin(t * 4.4)) * 30;
    toy.setAttribute("transform", "translate(" + tx + "," + ty + ") rotate(" + (t * 220 % 360) + " 0 0)");
    var pawY = Math.sin(t * 4.4) * -6;
    paws.setAttribute("transform", "translate(0," + pawY + ")");
    var tailA = Math.sin(t * 3) * 14;
    tail.setAttribute("transform", "rotate(" + tailA + " 205 120)");
    var headA = Math.sin(t * 2.2) * 6;
    head.setAttribute("transform", "rotate(" + headA + " 148 98)");
    if (animPlaying) animFrame = requestAnimationFrame(animLoop);
    else animFrame = null;
  }
  var blinkTimer = null;
  function sleepyBlink() {
    clearInterval(blinkTimer);
    var zo = 0;
    blinkTimer = setInterval(function () {
      if (running) { clearInterval(blinkTimer); return; }
      zo = zo ? 0 : 1;
      zzz.setAttribute("opacity", zo ? "0.7" : "0");
    }, 1400);
  }

  // ---------- cat meow (Web Audio synth) ----------
  var audioCtx = null;
  function playMeow() {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      meowOnce(0, 620, 480);
      meowOnce(0.45, 700, 520);
    } catch (e) {}
  }
  function meowOnce(delay, f1, f2) {
    var t0 = audioCtx.currentTime + delay;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    var filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass"; filter.frequency.value = 1600;
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(f1 * 0.8, t0);
    osc.frequency.linearRampToValueAtTime(f2, t0 + 0.12);
    osc.frequency.linearRampToValueAtTime(f1 * 0.7, t0 + 0.38);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.linearRampToValueAtTime(0.22, t0 + 0.06);
    gain.gain.linearRampToValueAtTime(0.18, t0 + 0.28);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.42);
    osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + 0.45);
  }

  // ---------- tabs ----------
  var tabBtns = document.querySelectorAll(".tabs button");
  tabBtns.forEach(function (b) {
    b.addEventListener("click", function () { switchScreen(b.dataset.screen); });
  });
  function switchScreen(name) {
    tabBtns.forEach(function (b) { b.classList.toggle("active", b.dataset.screen === name); });
    ["pomo", "cal", "detail"].forEach(function (s) {
      $("screen-" + s).classList.toggle("active", s === name);
    });
    if (name === "cal") refreshCalendar();
  }

  // ---------- calendar ----------
  var calGrid = $("calGrid"), calTitle = $("calTitle");
  var viewYear, viewMonth;
  (function initView() { var n = new Date(); viewYear = n.getFullYear(); viewMonth = n.getMonth(); })();

  function levelFor(count) {
    if (count <= 0) return 0;
    if (count === 1) return 1;
    if (count === 2) return 2;
    if (count <= 4) return 3;
    return 4;
  }

  function refreshCalendar() {
    calTitle.textContent = viewYear + "년 " + (viewMonth + 1) + "월";
    calGrid.innerHTML = "";
    ["일", "월", "화", "수", "목", "금", "토"].forEach(function (d) {
      var el = document.createElement("div");
      el.className = "cal-dow"; el.textContent = d;
      calGrid.appendChild(el);
    });
    var first = new Date(viewYear, viewMonth, 1);
    var startDow = first.getDay();
    var daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    for (var i = 0; i < startDow; i++) {
      var e = document.createElement("div");
      e.className = "cal-cell empty";
      calGrid.appendChild(e);
    }
    for (var day = 1; day <= daysInMonth; day++) {
      var key = viewYear + "-" + String(viewMonth + 1).padStart(2, "0") + "-" + String(day).padStart(2, "0");
      var rec = data.records[key];
      var count = rec ? rec.tasks.length : 0;
      var cell = document.createElement("div");
      cell.className = "cal-cell lvl" + levelFor(count);
      if (key === todayKey) cell.classList.add("today");
      var dnum = document.createElement("div");
      dnum.className = "dnum"; dnum.textContent = day;
      cell.appendChild(dnum);
      if (rec && rec.sessions > 0) {
        var dot = document.createElement("div");
        dot.className = "dot"; dot.textContent = "🍅" + rec.sessions;
        cell.appendChild(dot);
      }
      (function (k) {
        cell.addEventListener("click", function () { openDetail(k); });
      })(key);
      calGrid.appendChild(cell);
    }
  }

  $("prevMonth").addEventListener("click", function () {
    viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } refreshCalendar();
  });
  $("nextMonth").addEventListener("click", function () {
    viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } refreshCalendar();
  });

  // ---------- detail ----------
  function openDetail(key) {
    switchScreen("detail");
    var parts = key.split("-");
    $("detailDate").textContent = parts[0] + "년 " + Number(parts[1]) + "월 " + Number(parts[2]) + "일";
    var rec = data.records[key];
    var tasks = rec ? rec.tasks : [];
    var sessions = rec ? rec.sessions : 0;
    $("statTasks").textContent = tasks.length;
    $("statSessions").textContent = sessions;
    var list = $("doneList");
    list.innerHTML = "";
    if (tasks.length === 0) {
      $("detailSub").textContent = "이 날은 완료한 기록이 없어요.";
      var note = document.createElement("div");
      note.className = "empty-note"; note.textContent = "🌙 기록이 없는 날이에요";
      list.appendChild(note);
    } else {
      $("detailSub").textContent = "완료한 태스크 " + tasks.length + "개 · 세션 " + sessions + "회";
      tasks.forEach(function (t) {
        var li = document.createElement("li");
        li.innerHTML = '<span class="check">✓</span>' + escapeHtml(t);
        list.appendChild(li);
      });
    }
  }
  $("backToCal").addEventListener("click", function () { switchScreen("cal"); });

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // ---------- init ----------
  totalSeconds = Number(durSlider.value) * 60;
  remaining = totalSeconds;
  durVal.textContent = durSlider.value + "분";
  renderTime();
  renderTasks();
  updateTodaySessions();
  setCatPlaying(false);
  refreshCalendar();
})();
</script>
</body>
</html>
