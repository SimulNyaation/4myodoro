<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="56" fill="#c0764c"/>
  <rect x="10" y="10" width="236" height="236" rx="48" fill="#d98e63"/>
  <!-- ears -->
  <path d="M74 84 L62 38 L108 70 Z" fill="#f4ece1"/>
  <path d="M182 84 L194 38 L148 70 Z" fill="#f4ece1"/>
  <path d="M82 78 L75 54 L100 70 Z" fill="#e0a884"/>
  <path d="M174 78 L181 54 L156 70 Z" fill="#e0a884"/>
  <!-- face / clock -->
  <circle cx="128" cy="142" r="76" fill="#f4ece1"/>
  <circle cx="128" cy="142" r="76" fill="none" stroke="#e6dac9" stroke-width="4"/>
  <!-- clock tick marks -->
  <g stroke="#c4b1a1" stroke-width="4" stroke-linecap="round">
    <line x1="128" y1="76"  x2="128" y2="86"/>
    <line x1="128" y1="198" x2="128" y2="208"/>
    <line x1="62"  y1="142" x2="72"  y2="142"/>
    <line x1="184" y1="142" x2="194" y2="142"/>
  </g>
  <!-- eyes -->
  <circle cx="104" cy="134" r="8" fill="#5a4a3a"/>
  <circle cx="152" cy="134" r="8" fill="#5a4a3a"/>
  <circle cx="106" cy="131" r="2.5" fill="#fff"/>
  <circle cx="154" cy="131" r="2.5" fill="#fff"/>
  <!-- nose -->
  <path d="M122 150 h12 l-6 8 z" fill="#d98e63"/>
  <!-- mouth -->
  <path d="M128 158 q-9 9 -18 3 M128 158 q9 9 18 3" stroke="#8a7665" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- whiskers -->
  <g stroke="#c4b1a1" stroke-width="3" stroke-linecap="round">
    <line x1="96"  y1="150" x2="64"  y2="146"/>
    <line x1="96"  y1="158" x2="66"  y2="162"/>
    <line x1="160" y1="150" x2="192" y2="146"/>
    <line x1="160" y1="158" x2="190" y2="162"/>
  </g>
